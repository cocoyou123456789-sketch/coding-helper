name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Test and build static site
        run: npm test

      - name: Verify export
        run: |
          test -f dist/client/index.html
          test -f dist/client/python-worker-signature-v1.js
          test -f dist/client/manifest.webmanifest
          test -f dist/client/sw.js
          test -f dist/client/favicon.png
          test -f dist/client/icons/apple-touch-icon.png
          test -f dist/client/icons/icon-192.png
          test -f dist/client/icons/icon-512.png
          test -f dist/client/icons/icon-maskable-512.png
          test -f dist/client/privacy/index.html
          test -f dist/client/support/index.html
          test -f dist/client/licenses/index.html
          node --check dist/client/sw.js
          node -e 'const fs = require("fs"); const manifest = JSON.parse(fs.readFileSync("dist/client/manifest.webmanifest", "utf8")); if (manifest.scope !== "./" || manifest.display !== "standalone") process.exit(1)'
          grep -q '/coding-helper/' dist/client/index.html
          grep -q '/coding-helper/manifest.webmanifest' dist/client/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
